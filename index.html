<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Cobrança — Sistema de gestão financeira profissional para cobranças, dívidas e fluxo de caixa." />
    <title>Cobrança — ERP Financeiro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366F1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cobrança" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/index.css" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: "#6366F1", hover: "#4F46E5", light: "rgba(99,102,241,0.08)" },
                        danger: { DEFAULT: "#EF4444", light: "rgba(239,68,68,0.08)" },
                        warning: { DEFAULT: "#F59E0B", light: "rgba(245,158,11,0.08)" },
                        success: { DEFAULT: "#10B981", light: "rgba(16,185,129,0.08)" },
                        info: { DEFAULT: "#3B82F6", light: "rgba(59,130,246,0.08)" },
                        "background-light": "#F8FAFC",
                        "background-dark": "#0C111D",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#161B26",
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'SF Mono', 'monospace'],
                    },
                    borderRadius: {
                        '2xl': '16px',
                        '3xl': '20px',
                        '4xl': '24px',
                    },
                    boxShadow: {
                        'premium': '0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04)',
                        'premium-md': '0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.04)',
                        'premium-lg': '0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04)',
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 transition-colors duration-200 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
